services:
  # ── Web Service ──────────────────────────────────────────────────────────────
  - type: web
    name: go-laundry-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/schema/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true            # Render generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "go-loundry-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: go-laundry-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        # Set this manually in the Render dashboard to your frontend origin(s)
        value: ""
      - key: WEB_CONCURRENCY
        value: "2"

  # ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: go-laundry-db
    databaseName: go_laundry
    plan: free              # Upgrade to starter/standard for persistent storage
    ipAllowList: []         # Only allow internal connections from the web service
